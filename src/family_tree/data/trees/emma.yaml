# =============================================================================
#  Sample Family Tree — fictional Dutch family (de Vries / de Groot)
# =============================================================================
# This file is intentionally fictional and is provided as a working example.
# Replace names and structure with your own family data.
#
# A person (node) looks like:
#   name:  canonical English key (mapped to display text in translations.json)
#   g:     gender — "m" or "f" (controls box colour)
#   sp:    spouse name key            (optional)
#   sp2:   second spouse name key     (optional, shown as "sp / sp2")
#   alias: nickname, shown as Name ("Alias")   (optional)
#   kids:  list of child nodes        (optional)
#
# Flags (optional, set to true):
#   root        grey two-box root couple at the start of a page
#   star        marks the "you are here" person (★)
#   cousin      spouse subline shows "(cousin)"
#   cousin_src  the other end of a cousin marriage
#   step        dotted connector line to this child
# Special:
#   bridge: "(see paternal page)"  couple shown on both pages (thick border)
# =============================================================================

slug: emma_family_tree

pages:
  # ── MATERNAL PAGE ─────────────────────────────────────────────────────────
  - title: maternal_title
    subtitle: maternal_subtitle
    star_person: Emma
    legend: basic
    tree:
      name: Hendrik
      g: m
      sp: Maria
      root: true
